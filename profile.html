<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAI Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#4f46e5);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:420px;
padding:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.avatar{
width:100px;
height:100px;
margin:0 auto 20px;
border-radius:50%;
background:linear-gradient(135deg,#2563eb,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
}

h1{
margin-bottom:10px;
}

p{
color:#ddd;
margin-bottom:25px;
}

button{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="avatar">👤</div>

<h1>VisionAI User</h1>

<p>Welcome to your AI Dashboard</p>

<button>📜 Chat History</button>

<button>🖼 Image History</button>

<button>🎬 Video History</button>

<button>⚙️ Settings</button>

<button onclick="window.location.href='index.html'">
🏠 Back Home
</button>

</div>

</body>
</html>
