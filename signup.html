<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAI Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#4f46e5);
color:white;
}

.container{
width:90%;
max-width:420px;
padding:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Create VisionAI Account</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="signupBtn">Create Account</button>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
