<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VisionAI Prompt Enhancer</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:150px;
padding:15px;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
border:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

#output{
margin-top:20px;
padding:15px;
background:#1f2937;
border-radius:10px;
white-space:pre-wrap;
}

video{
width:100%;
margin-top:20px;
border-radius:10px;
display:none;
}
</style>

</head>

<body>

<h2>✨ VisionAI Prompt Enhancer</h2>

<textarea id="prompt" placeholder="Write your prompt..."></textarea>

<button onclick="enhancePrompt()">
✨ Enhance Prompt
</button>

<button onclick="generateVideo()">
🎬 Generate Video
</button>

<div id="output"></div>

<video id="video" controls></video>

<script>

async function enhancePrompt(){

const prompt=document.getElementById("prompt").value;
const output=document.getElementById("output");

if(!prompt){
output.innerHTML="Please enter a prompt.";
return;
}

output.innerHTML="⏳ Enhancing Prompt...";

try{

const res=await fetch("https://visionai-backend-ubhl.onrender.com/enhance",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
});

const data=await res.json();

output.innerHTML=data.prompt || data.error;

}catch(err){

output.innerHTML="❌ Error";

}

}

async function generateVideo(){

const prompt=document.getElementById("prompt").value;
const output=document.getElementById("output");

output.innerHTML="🎬 Generating Video...";

try{

const res=await fetch("https://visionai-backend-ubhl.onrender.com/video",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt
})
});

const data=await res.json();

if(data.video){

document.getElementById("video").src=data.video;
document.getElementById("video").style.display="block";

output.innerHTML="✅ Video Generated Successfully";

}else{

output.innerHTML=data.error;

}

}catch(err){

output.innerHTML="❌ Video Generation Failed";

}

}

</script>

</body>
</html>
