<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VisionAI Chat</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
padding:20px;
}
h1{
text-align:center;
}
textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-top:20px;
}
button{
width:100%;
padding:15px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}
#result{
margin-top:20px;
background:#1f2937;
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>💬 VisionAI Chat</h1>

<textarea id="prompt" placeholder="Type your message..."></textarea>

<button onclick="chat()">Send</button>

<div id="result">Response will appear here...</div>

<script>
async function chat() {
  const message = document.getElementById("prompt").value;

  const res = await fetch("https://visionai-backend-ubhl.onrender.com/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: message
    })
  });

  const data = await res.json();
  document.getElementById("result").innerHTML = data.reply;
}
</script>
<script>
window.onload = function () {

const prompt = localStorage.getItem("vision_prompt");

if(prompt){

const input = document.getElementById("prompt");

if(input){
input.value = prompt;
}chat();

localStorage.removeItem("vision_prompt");

}

};
</script>
</body>
</html>
