<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VisionAI Chat</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
padding:20px;
}
h1{
text-align:center;
}
textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
margin-top:20px;
}
button{
width:100%;
padding:15px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}
#result{
margin-top:20px;
background:#1f2937;
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>💬 VisionAI Chat</h1>

<textarea id="prompt" placeholder="Type your message..."></textarea>

<button onclick="chat()">Send</button>

<div id="result">Response will appear here...</div>

<script>
function chat(){
let text=document.getElementById("prompt").value;
document.getElementById("result").innerHTML="You typed: "+text;
}
</script>

</body>
</html>
