<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAI Voice Assistant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#4f46e5);
color:white;
}

.container{
width:90%;
max-width:420px;
padding:25px;
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
}

.mic{
font-size:90px;
margin:30px 0;
cursor:pointer;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:20px;
color:#ddd;
}
</style>
</head>

<body>

<div class="container">

<h1>🎙️ Voice Assistant</h1>

<div class="mic">🎤</div>

<button id="startVoice">Start Listening</button>

<p id="status">Press the button to start.</p>

</div>

<script>
document.getElementById("startVoice").onclick=function(){
document.getElementById("status").innerHTML=
"🎤 Voice feature will be connected in the next step.";
}
</script>

</body>
</html>
