<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisionAI Video Generator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#4f46e5);
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:450px;
padding:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.35);
}

h1{
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border:none;
border-radius:15px;
resize:none;
font-size:16px;
margin-bottom:20px;
outline:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:linear-gradient(90deg,#2563eb,#7c3aed);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#status{
margin-top:20px;
color:#ddd;
}
</style>

<script>
async function generateVideo(){

const prompt = document.getElementById("videoPrompt").value;
const result = document.getElementById("videoResult");

result.innerHTML = "⏳ Generating...";

try{

const res = await fetch("https://visionai-backend-ubh1.onrender.com/video",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt:prompt
})

});

const data = await res.json();

if(data.video){
result.innerHTML =
`<video controls width="100%" src="${data.video}"></video>`;
}else{
result.innerHTML = "❌ Video generation failed.";
}

}catch(e){

result.innerHTML = "⚠️ Server Error";

}

}
</script>
<body>

<div class="container">

<h1>🎬 AI Video Generator</h1>

<textarea
id="videoPrompt"
placeholder="Describe your video..."></textarea>

<button onclick="generateVideo()">
Generate Video
</button>

<div id="videoResult"></div>

</div>



</body>
</html>
